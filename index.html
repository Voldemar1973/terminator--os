<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINATOR - Tactical Pre-order</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-red: #ff003c;
            --dark-bg: #050506;
            --card-bg: rgba(10, 10, 12, 0.95);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
        }

        /* ЯСКРАВА КНОПКА ЗВУКУ */
        #sound-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            background: var(--neon-red);
            border: 2px solid white;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--neon-red);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px var(--neon-red); }
            50% { transform: scale(1.1); box-shadow: 0 0 25px var(--neon-red); }
            100% { transform: scale(1); box-shadow: 0 0 10px var(--neon-red); }
        }

        .hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background-image: linear-gradient(to bottom, rgba(5, 5, 6, 0.5) 0%, var(--dark-bg) 95%), url('hero.jpg');
            background-size: cover; background-position: center top;
            z-index: -2; opacity: 0.8;
        }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; position: relative; }
        header { text-align: center; padding: 40px 0 20px; }
        .logo-glitch { font-size: 2.2rem; font-weight: 900; letter-spacing: 5px; text-shadow: 2px 0 var(--neon-red), -2px 0 var(--neon-blue); }

        .card {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 20px; margin-bottom: 20px;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 95% 100%, 0 100%);
        }

        .btn-act {
            width: 100%; padding: 16px; background: transparent; border: 1px solid #fff; color: #fff;
            font-family: 'Orbitron'; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        
        footer { text-align: center; padding: 30px 0; font-size: 9px; opacity: 0.3; }
    </style>
</head>
<body onclick="forcePlay()">

<div id="sound-control" onclick="toggleMusic()">🔊</div>

<audio id="bg-music" loop preload="auto">
    <source src="theme.mp3" type="audio/mpeg">
</audio>

<div class="hero-bg"></div>

<div class="container">
    <header>
        <div class="logo-glitch">TERMINATOR</div>
        <p style="font-size: 0.7rem; opacity: 0.6; letter-spacing: 2px;">TACTICAL INTERFACE ACTIVE</p>
    </header>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span style="font-size: 0.8rem;">STARTER PACK</span>
            <span style="font-size: 1.8rem; font-weight: bold;">99 UAH</span>
        </div>
        <button class="btn-act" onclick="buy('starter')">ACTIVATE</button>
    </div>

    <footer>v1.0.6 | AUDIO_FORCE_ENABLED</footer>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const music = document.getElementById('bg-music');
    const soundBtn = document.getElementById('sound-control');

    function forcePlay() {
        music.muted = false;
        music.play().then(() => {
            soundBtn.style.animation = "none";
            soundBtn.innerText = "🔊";
        }).catch(e => console.log("Audio waiting..."));
    }

    function toggleMusic() {
        if (music.paused) {
            music.play();
            soundBtn.innerText = "🔊";
        } else {
            music.pause();
            soundBtn.innerText = "🔇";
        }
    }

    // Спроба запустити при будь-якому русі
    window.addEventListener('scroll', forcePlay, { once: true });
    document.addEventListener('touchstart', forcePlay, { once: true });

    function buy(tier) {
        tg.HapticFeedback.impactOccurred('heavy');
        forcePlay();
        tg.showAlert("ПРОТОКОЛ АКТИВОВАНО. ПЕРЕВІРТЕ ЗВУК.");
    }
</script>
</body>
</html>
