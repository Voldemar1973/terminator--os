        <!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* ЗМІНИВ КОЛІР НА ЧЕРВОНИЙ - ПОВНИЙ T-800 HUD */
        :root { --main-color: #ff0000; --secondary-color: #aa0000; --bg-dark: #000000; }
        body { margin: 0; background: var(--bg-dark); color: var(--main-color); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; text-transform: uppercase; }
        
        /* Червона тактична мапа - Sepia(100%), Hue-rotate(0) */
        #map { width: 100%; height: 100vh; filter: brightness(0.7) contrast(1.2) sepia(100%) hue-rotate(0deg) saturate(3); transition: opacity 2s ease; opacity: 0; }
        
        /* Радар поверх мапи - червоний */
        .radar-overlay {
            position: absolute; top: 50%; left: 50%; width: 150vmax; height: 150vmax;
            transform: translate(-50%, -50%);
            background: repeating-radial-gradient(circle, rgba(255,0,0,0.03) 0%, rgba(255,0,0,0.03) 8%, transparent 8.1%, transparent 16%);
            pointer-events: none; z-index: 1000;
        }
        
        /* Промінь сканера - червоний */
        .radar-sweep {
            position: absolute; top: 50%; left: 50%; width: 100vmax; height: 100vmax;
            background: conic-gradient(from 0deg, rgba(255,0,0,0.15) 0deg, transparent 60deg);
            transform: translate(-50%, -50%);
            animation: rotate 6s linear infinite;
            z-index: 1001; pointer-events: none;
        }

        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        .header { position: absolute; top: 15px; left: 15px; z-index: 1005; background: rgba(10,0,0,0.9); padding: 12px; border-left: 4px solid var(--main-color); border-bottom: 1px solid var(--main-color); text-transform: uppercase; font-weight: bold; font-size: 13px; }
        .coords { font-size: 10px; margin-top: 5px; color: rgba(255,0,0,0.7); }

        .btn-scan { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            z-index: 1005; background: rgba(10,0,0,0.9); border: 2px solid var(--main-color); 
            color: var(--main-color); padding: 15px 35px; cursor: pointer; 
            text-transform: uppercase; font-weight: bold; letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(255,0,0,0.3); transition: all 0.3s ease;
        }
        .btn-scan:active { background: var(--main-color); color: var(--bg-dark); }

        .leaflet-marker-icon { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.2; transform: scale(1.15); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div class="radar-overlay"></div>
    <div class="radar-sweep"></div>
    
    <div class="header">
        <div id="agent-status">T-800 SYSTEM: STANDBY</div>
        <div class="coords" id="pos">WAITING FOR T-OS SCAN...</div>
    </div>

    <div id="map"></div>

    <button class="btn-scan" onclick="findMe()">SCAN LOCAL SECTOR</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([50.45, 30.52], 13);
        // Використовуємо найтемніший шар мапи, який тільки є
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let marker = L.circleMarker([50.45, 30.52], { 
            color: '#ff0000', fillColor: '#ff0000', fillOpacity: 0.8, radius: 11 
        }).addTo(map);

        function findMe() {
            tg.HapticFeedback.impactOccurred('heavy');
            document.getElementById('agent-status').innerText = 'SCANNING...';
            document.getElementById('map').style.opacity = '1'; 
            
            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                document.getElementById('pos').innerText = `T-OS LAT: ${lat.toFixed(4)} | LON: ${lon.toFixed(4)}`;
                document.getElementById('agent-status').innerText = 'TARGET LOCKED';
                
                map.flyTo([lat, lon], 16, { duration: 2.5 });
                marker.setLatLng([lat, lon]);
                
                tg.HapticFeedback.notificationOccurred('success');
            }, (err) => {
                document.getElementById('agent-status').innerText = 'ERROR: GPS LINK FAILED';
            });
        }
        
        const user = tg.initDataUnsafe?.user;
        if (user) document.getElementById('agent-status').innerText = 'AGENT: ' + user.first_name.toUpperCase();
    </script>
</body>
</html>
