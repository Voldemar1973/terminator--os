<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --t-red: #ff0000; --t-green: #00ff00; }
        body { margin: 0; background: #000; color: var(--t-red); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; text-transform: uppercase; }
        
        #video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        
        .hud-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.2);
            pointer-events: none; z-index: 2;
            border: 2px solid rgba(255, 0, 0, 0.3);
            box-sizing: border-box;
        }

        .header { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.7); padding: 10px; border-left: 3px solid var(--t-red); }
        .logs { font-size: 10px; color: var(--t-green); margin-top: 5px; }

        .dist-container {
            position: absolute; bottom: 150px; width: 100%; text-align: center;
            z-index: 10; font-size: 24px; color: var(--t-green); text-shadow: 0 0 10px #00ff00;
        }

        .controls {
            position: absolute; bottom: 40px; width: 100%; display: flex;
            justify-content: center; gap: 15px; z-index: 10; padding: 0 20px; box-sizing: border-box;
        }

        .btn {
            background: rgba(0,0,0,0.8); border: 2px solid var(--t-red);
            color: var(--t-red); padding: 15px; cursor: pointer; font-weight: bold;
        }
        .btn-snap { border-color: var(--t-green); color: var(--t-green); flex: 1; }
        .btn-main { flex: 2; }

        #snap-canvas { display: none; }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="v" autoplay playsinline muted></video>
        <div class="hud-overlay"></div>
    </div>

    <div class="header">
        <div id="status">T-800: STANDBY</div>
        <div class="logs" id="logs">> СИСТЕМА ГОТОВА</div>
    </div>

    <div class="dist-container">
        DIST: <span id="dist-val">00000</span> M
    </div>

    <div class="controls">
        <button class="btn btn-snap" onclick="takeSnapshot()">📷 SNAP</button>
        <button class="btn btn-main" id="startBtn" onclick="initCamera()">INITIALIZE VISION</button>
    </div>

    <canvas id="snap-canvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let currentDist = "00000";

        async function initCamera() {
            const v = document.getElementById('v');
            const logs = document.getElementById('logs');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                v.srcObject = stream;
                v.play();
                document.getElementById('status').innerText = 'SYSTEM: LIVE';
                logs.innerHTML = '> ОПТИКА АКТИВОВАНА<br>> СКАНУВАННЯ...';
                tg.HapticFeedback.impactOccurred('heavy');
                updateDist();
            } catch (err) {
                logs.innerText = '> ПОМИЛКА: ' + err.name;
                alert('Будь ласка, надайте доступ до камери!');
            }
        }

        function updateDist() {
            navigator.geolocation.getCurrentPosition((pos) => {
                const target = {lat: 50.45, lon: 30.52};
                const d = Math.sqrt(Math.pow(pos.coords.latitude - target.lat, 2) + Math.pow(pos.coords.longitude - target.lon, 2)) * 111320;
                currentDist = Math.round(d).toString();
                document.getElementById('dist-val').innerText = currentDist;
            });
        }

        function takeSnapshot() {
            const v = document.getElementById('v');
            const canvas = document.getElementById('snap-canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = v.videoWidth;
            canvas.height = v.videoHeight;

            // 1. Малюємо кадр
            ctx.drawImage(v, 0, 0, canvas.width, canvas.height);

            // 2. Червоний фільтр
            ctx.fillStyle = "rgba(255, 0, 0, 0.25)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 3. Водяний знак (Реклама бота)
            ctx.fillStyle = "white";
            ctx.font = "bold 30px Arial";
            ctx.fillText("@TerminatorOS_Bot", 30, canvas.height - 40);

            // 4. Дані HUD
            ctx.fillStyle = "#00ff00";
            ctx.fillText("DIST: " + currentDist + " M", 30, 60);
            
            // Зберігання
            const link = document.createElement('a');
            link.download = 'terminator_snap.png';
            link.href = canvas.toDataURL();
            link.click();
            
            tg.HapticFeedback.notificationOccurred('success');
            document.getElementById('status').innerText = 'PHOTO SAVED';
        }
    </script>
</body>
</html>
