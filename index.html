<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --main-color: #00f2ff; --bg-dark: #000b14; }
        body { margin: 0; background: var(--bg-dark); color: var(--main-color); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }
        
        #map { width: 100%; height: 100vh; filter: brightness(0.6) contrast(1.2) hue-rotate(180deg) invert(1); }
        
        /* Тактичний шар поверх мапи */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; border: 2px solid var(--main-color); box-sizing: border-box; z-index: 1000; box-shadow: inset 0 0 50px rgba(0,242,255,0.2); }
        
        .header { position: absolute; top: 10px; left: 10px; z-index: 1001; background: rgba(0,11,20,0.8); padding: 10px; border-left: 3px solid var(--main-color); }
        .coords { font-size: 12px; letter-spacing: 1px; }

        .scan-line { position: absolute; width: 100%; height: 2px; background: rgba(0,242,255,0.3); top: 0; z-index: 1002; animation: move 4s linear infinite; }
        @keyframes move { from { top: 0; } to { top: 100%; } }

        .btn-scan { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1001; background: var(--bg-dark); border: 2px solid var(--main-color); color: var(--main-color); padding: 15px 40px; pointer-events: auto; cursor: pointer; text-transform: uppercase; font-weight: bold; box-shadow: 0 0 15px var(--main-color); }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="scan-line"></div>
    
    <div class="header">
        <div id="agent-status">AGENT: CONNECTING...</div>
        <div class="coords" id="pos">LAT: 0.000 | LON: 0.000</div>
    </div>

    <div id="map"></div>

    <button class="btn-scan" onclick="findMe()">SCAN AREA</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Ініціалізація мапи (темний стиль)
        const map = L.map('map', { zoomControl: false }).setView([50.45, 30.52], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const marker = L.circleMarker([50.45, 30.52], { color: '#00f2ff', radius: 10, fillOpacity: 0.8 }).addTo(map);

        function findMe() {
            tg.HapticFeedback.impactOccurred('heavy');
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude.toFixed(4);
                    const lon = position.coords.longitude.toFixed(4);
                    document.getElementById('pos').innerText = `LAT: ${lat} | LON: ${lon}`;
                    map.setView([lat, lon], 16);
                    marker.setLatLng([lat, lon]);
                    tg.HapticFeedback.notificationOccurred('success');
                });
            }
        }
        
        const user = tg.initDataUnsafe?.user;
        if (user) document.getElementById('agent-status').innerText = 'AGENT: ' + user.first_name.toUpperCase();
    </script>
</body>
</html>
