<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --t-red: #ff0000; --t-green: #00ff00; }
        body { margin: 0; background: #000; color: var(--t-red); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; text-transform: uppercase; font-weight: bold; }
        
        /* КОНТЕЙНЕР ДЛЯ ВІДЕО */
        #video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        
        /* ЧЕРВОНИЙ ФІЛЬТР HUD */
        .hud-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.25);
            pointer-events: none; z-index: 2;
        }

        /* ПОСТІЙНИЙ ВОДЯНИЙ ЗНАК (Для системних скріншотів) */
        .hud-overlay::after {
            content: "@TerminatorOS_Bot";
            position: absolute;
            bottom: 120px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px #000;
        }

        /* АНІМОВАНА ЛІНІЯ СКАНУВАННЯ */
        .scanline {
            position: absolute; width: 100%; height: 4px;
            background: rgba(255, 0, 0, 0.4);
            top: 0; z-index: 3;
            animation: moveScanline 4s linear infinite;
        }
        @keyframes moveScanline { from { top: -5%; } to { top: 105%; } }

        /* СИСТЕМНЕ ТАБЛО */
        .header { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(10,0,0,0.8); padding: 12px; border-left: 4px solid var(--t-red); font-size: 13px; }
        .logs { font-size: 11px; color: var(--t-green); margin-top: 5px; }

        /* ВІДСТАНЬ */
        .dist-container {
            position: absolute; bottom: 180px; width: 100%; text-align: center;
            z-index: 10; font-size: 26px; color: var(--t-green); text-shadow: 0 0 10px #00ff00;
        }

        /* КНОПКИ */
        .controls { position: absolute; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 10; padding: 0 20px; box-sizing: border-box; }
        .btn { background: rgba(10,0,0,0.9); border: 2px solid var(--t-red); color: var(--t-red); padding: 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .btn-snap { border-color: var(--t-green); color: var(--t-green); flex: 1; }
        .btn-main { flex: 2; letter-spacing: 1px; }
        .btn:active { background: var(--t-red); color: #000; }
        .btn-snap:active { background: var(--t-green); color: #000; }

        /* ПРИХОВАНИЙ КАНВАС */
        #snap-canvas { display: none; }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="v" autoplay playsinline muted></video>
        <div class="hud-overlay"></div>
        <div class="scanline"></div>
    </div>

    <div class="header">
        <div id="status">T-800 SYSTEM: READY</div>
        <div id="logs" class="logs">> WAITING FOR INITIALIZATION...</div>
    </div>

    <div class="dist-container">
        ВІДСТАНЬ: <span id="dist-val">00000</span> М
    </div>

    <div class="controls">
        <button class="btn btn-snap" onclick="takeSnapshot()">📷 SNAP</button>
        <button class="btn btn-main" onclick="initCamera()">INITIALIZE VISION</button>
    </div>

    <canvas id="snap-canvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let currentDist = "00000";

        async function initCamera() {
            const v = document.getElementById('v');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                v.srcObject = stream;
                v.play();
                document.getElementById('status').innerText = 'SYSTEM: LIVE';
                document.getElementById('logs').innerHTML = '> OPTICS ACTIVE<br>> SCANNING SECTOR...';
                tg.HapticFeedback.impactOccurred('heavy');
                startTracking();
            } catch (err) {
                document.getElementById('logs').innerText = '> ERROR: ' + err.name;
                alert('Потрібен доступ до камери!');
            }
        }

        function startTracking() {
            navigator.geolocation.watchPosition((pos) => {
                const target = {lat: 50.4501, lon: 30.5234}; // Київ
                const d = Math.sqrt(Math.pow(pos.coords.latitude - target.lat, 2) + Math.pow(pos.coords.longitude - target.lon, 2)) * 111320;
                currentDist = Math.round(d).toString();
                document.getElementById('dist-val').innerText = currentDist;
            });
        }

        function takeSnapshot() {
            const v = document.getElementById('v');
            const canvas = document.getElementById('snap-canvas');
            const ctx = canvas.getContext('2d');

            if (!v.srcObject) return;

            canvas.width = v.videoWidth;
            canvas.height = v.videoHeight;

            // 1. Кадр з камери
            ctx.drawImage(v, 0, 0, canvas.width, canvas.height);

            // 2. Червоний фільтр
            ctx.fillStyle = "rgba(255, 0, 0, 0.3)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 3. Дані на фото (Водяний знак + Дистанція)
            ctx.fillStyle = "white";
            ctx.font = "bold " + (canvas.height * 0.05) + "px Arial";
            ctx.fillText("@TerminatorOS_Bot", 30, canvas.height - 50);

            ctx.fillStyle = "#00ff00";
            ctx.font = "bold " + (canvas.height * 0.06) + "px Arial";
            ctx.fillText("DIST: " + currentDist + " M", 30, 80);

            // 4. Збереження
            try {
                const dataUrl = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.download = `T800_TARGET_${Date.now()}.png`;
                link.href = dataUrl;
                link.click();
                
                document.getElementById('status').innerText = 'DATA EXPORTED';
                tg.HapticFeedback.notificationOccurred('success');
            } catch (e) {
                document.getElementById('logs').innerText = '> EXPORT FAILED';
            }
        }
    </script>
</body>
</html>
