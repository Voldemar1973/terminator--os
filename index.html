<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --t-red: #ff0000; --t-green: #00ff00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: var(--t-red); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; text-transform: uppercase; }
        
        /* ВІДЕО НА ВЕСЬ ЕКРАН */
        video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; background: transparent;
        }
        
        /* ШАР HUD */
        #hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
            background: rgba(255, 0, 0, 0.2); /* Тільки легкий відтінок */
        }

        .scanline {
            position: absolute; width: 100%; height: 4px;
            background: rgba(255, 0, 0, 0.4); top: 0;
            animation: move 4s linear infinite;
        }
        @keyframes move { from { top: 0; } to { top: 100%; } }

        /* ІНТЕРФЕЙС */
        .ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        
        .header { background: rgba(0,0,0,0.7); padding: 10px; border-left: 3px solid var(--t-red); }
        .logs { font-size: 10px; color: var(--t-green); margin-top: 5px; }

        .distance { font-size: 28px; color: var(--t-green); text-align: center; text-shadow: 0 0 10px #00ff00; margin-bottom: 20px; }

        .btns { display: flex; gap: 10px; margin-bottom: 30px; }
        .btn { background: rgba(0,0,0,0.8); border: 2px solid var(--t-red); color: var(--t-red); padding: 18px; flex: 1; font-weight: bold; cursor: pointer; }
        .btn-snap { border-color: var(--t-green); color: var(--t-green); flex: 0.4; font-size: 20px; }
        
        canvas { display: none; }
    </style>
</head>
<body>
    <video id="v" autoplay playsinline muted></video>
    <div id="hud"><div class="scanline"></div></div>

    <div class="ui">
        <div class="header">
            <div id="st">T-800: STANDBY</div>
            <div class="logs" id="l">> WAITING FOR ACTIVATION...</div>
        </div>

        <div>
            <div class="distance">DIST: <span id="dv">00000</span> M</div>
            <div class="btns">
                <button class="btn btn-snap" onclick="snap()">📷</button>
                <button class="btn" onclick="start()">ACTIVATE VISION</button>
            </div>
        </div>
    </div>

    <canvas id="c"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        async function start() {
            const v = document.getElementById('v');
            const l = document.getElementById('l');
            const st = document.getElementById('st');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", focusMode: "continuous" }, 
                    audio: false 
                });
                v.srcObject = stream;
                await v.play(); // Примусовий старт
                
                st.innerText = 'SYSTEM: LIVE';
                l.innerHTML = '> TARGET ACQUIRED<br>> SENSORS ONLINE';
                tg.HapticFeedback.impactOccurred('medium');
            } catch (e) {
                l.innerText = '> ERROR: ' + e.name;
                alert('Дозвольте доступ до камери!');
            }

            // Геолокація (Київ)
            navigator.geolocation.getCurrentPosition((p) => {
                const d = Math.round(Math.sqrt(Math.pow(p.coords.latitude - 50.45, 2) + Math.pow(p.coords.longitude - 30.52, 2)) * 111320);
                document.getElementById('dv').innerText = d;
            });
        }

        function snap() {
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            const ctx = c.getContext('2d');
            
            if (v.readyState !== 4) return alert('Камера не готова!');

            c.width = v.videoWidth;
            c.height = v.videoHeight;
            
            // 1. Фото
            ctx.drawImage(v, 0, 0);
            
            // 2. Червоний фільтр
            ctx.fillStyle = "rgba(255, 0, 0, 0.3)";
            ctx.fillRect(0, 0, c.width, c.height);
            
            // 3. Водяний знак
            ctx.fillStyle = "#00ff00";
            ctx.font = "bold 40px Courier New";
            ctx.fillText("DIST: " + document.getElementById('dv').innerText + " M", 50, 100);
            ctx.fillStyle = "rgba(255,255,255,0.7)";
            ctx.fillText("@TerminatorOS_Bot", c.width - 450, c.height - 50);

            const img = c.toDataURL("image/png");
            const a = document.createElement('a');
            a.href = img;
            a.download = 'terminator_vision.png';
            a.click();
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
