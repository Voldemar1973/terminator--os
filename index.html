<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --t-red: #ff0000; --t-green: #00ff00; }
        body { margin: 0; background: #000; color: var(--t-red); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; text-transform: uppercase; }
        
        /* КОНТЕЙНЕР ДЛЯ ВІДЕО */
        #video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* ЧЕРВОНИЙ ФІЛЬТР HUD */
        .hud-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.25); /* Напівпрозорий червоний */
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
            pointer-events: none; z-index: 2;
        }

        .header { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.6); padding: 10px; border-left: 3px solid var(--t-red); }
        .logs { font-size: 10px; color: var(--t-green); margin-top: 5px; }

        .dist-container {
            position: absolute; bottom: 120px; width: 100%; text-align: center;
            z-index: 10; font-size: 26px; font-weight: bold;
            color: var(--t-green); text-shadow: 0 0 10px #00ff00;
        }

        .btn-scan { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            z-index: 10; background: rgba(0,0,0,0.8); border: 2px solid var(--t-red); 
            color: var(--t-red); padding: 15px 30px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="v" autoplay playsinline></video>
        <div class="hud-layer"></div>
    </div>

    <div class="header">
        <div id="status">T-800: СИСТЕМА ГОТОВА</div>
        <div class="logs" id="logs">> ОЧІКУВАННЯ ІНІЦІАЛІЗАЦІЇ...</div>
    </div>

    <div class="dist-container">
        ВІДСТАНЬ: <span id="dist-val">00000</span> М
    </div>

    <button class="btn-scan" onclick="initTerminator()">УВІМКНУТИ КІБЕР-ЗІР</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        async function initTerminator() {
            document.getElementById('status').innerText = 'ЗАПУСК...';
            
            // Запуск камери
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                document.getElementById('v').srcObject = stream;
                document.getElementById('logs').innerHTML = '> КАМЕРА АКТИВОВАНА<br>> ФІЛЬТРИ НАКЛАДЕНО';
            } catch (err) {
                document.getElementById('logs').innerText = '> ПОМИЛКА КАМЕРИ: ' + err.message;
            }

            // Геолокація для відстані
            navigator.geolocation.getCurrentPosition((pos) => {
                const myLat = pos.coords.latitude;
                const myLon = pos.coords.longitude;
                const target = {lat: 50.45, lon: 30.52}; // Київ
                
                // Спрощена формула відстані
                const d = Math.sqrt(Math.pow(myLat - target.lat, 2) + Math.pow(myLon - target.lon, 2)) * 111320;
                document.getElementById('dist-val').innerText = Math.round(d);
                document.getElementById('status').innerText = 'ЦІЛЬ ЗАФІКСОВАНА';
                tg.HapticFeedback.notificationOccurred('success');
            });
        }
    </script>
</body>
</html>
